# Render Blueprint Configuration
# https://render.com/docs/blueprints

services:
  # Backend API Service
  - type: web
    name: neurix-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false # You'll set this manually
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3-flash-preview
      - key: TAVUS_API_KEY
        sync: false
      - key: TAVUS_REPLICA_ID
        sync: false

  # Frontend Static Site
  - type: web
    name: neurix-app
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: neurix-api
          type: web
          property: host
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_TAVUS_API_KEY
        sync: false
      - key: VITE_TAVUS_API_URL
        value: https://tavusapi.com/v2
      - key: VITE_TAVUS_REPLICA_ID
        sync: false
